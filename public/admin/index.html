<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小漫的角落 — 后台管理</title>
<style>
  :root {
    --bg: #FAF8F5;
    --card-bg: #F5F2EE;
    --text: #3D3530;
    --text-secondary: #8C7B70;
    --accent: #D4A5A0;
    --border: #E8E2DC;
    --hover-bg: #EDE5DF;
    --danger: #d4756b;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Noto Sans SC", -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    min-height: 100vh;
  }

  /* ─── Login ─── */
  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .login-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 48px 40px;
    max-width: 420px;
    width: 100%;
    text-align: center;
  }
  .login-card h1 { font-size: 24px; font-weight: 400; margin-bottom: 8px; }
  .login-card p  { color: var(--text-secondary); font-size: 14px; margin-bottom: 32px; }
  .login-card input {
    width: 100%; padding: 12px 16px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 15px; font-family: inherit;
    background: #fff; color: var(--text); margin-bottom: 16px;
  }
  .login-card input:focus { outline: none; border-color: var(--accent); }
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 10px 24px; border-radius: 999px; font-size: 14px;
    font-family: inherit; cursor: pointer; transition: all 0.2s;
    border: 1.5px solid var(--accent); background: transparent;
    color: var(--accent); font-weight: 500; text-decoration: none;
  }
  .btn:hover { background: var(--accent); color: #fff; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-danger  { border-color: var(--danger); color: var(--danger); }
  .btn-danger:hover  { background: var(--danger); color: #fff; }
  .btn-sm { padding: 6px 16px; font-size: 13px; }

  /* ─── Layout ─── */
  #app-screen { display: none; min-height: 100vh; }
  .app-layout { display: flex; min-height: 100vh; }

  /* ─── Sidebar ─── */
  .sidebar {
    width: 240px; background: var(--card-bg); border-right: 1px solid var(--border);
    padding: 32px 20px; display: flex; flex-direction: column;
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 10;
  }
  .sidebar .logo { font-size: 18px; font-weight: 500; margin-bottom: 36px; padding: 0 8px; }
  .sidebar nav a {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border-radius: 8px; color: var(--text-secondary); text-decoration: none;
    font-size: 14px; margin-bottom: 4px; transition: all 0.15s;
  }
  .sidebar nav a:hover,
  .sidebar nav a.active { background: var(--hover-bg); color: var(--text); }
  .sidebar .logout-btn {
    margin-top: auto; padding: 10px 12px; border-radius: 8px;
    background: none; border: none; font-family: inherit; font-size: 13px;
    color: var(--text-secondary); cursor: pointer; text-align: left;
  }
  .sidebar .logout-btn:hover { background: var(--hover-bg); color: var(--danger); }

  /* ─── Main ─── */
  .main { flex: 1; margin-left: 240px; padding: 40px 48px; max-width: calc(100% - 240px); }
  .page-header { margin-bottom: 32px; }
  .page-header h2 { font-size: 26px; font-weight: 400; margin-bottom: 4px; }
  .page-header p  { color: var(--text-secondary); font-size: 14px; }

  /* ─── Table ─── */
  .table-wrap { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 14px 20px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
  th { font-weight: 500; color: var(--text-secondary); font-size: 13px; background: var(--hover-bg); }
  td { color: var(--text); }
  .tag { display: inline-block; padding: 2px 10px; border-radius: 999px; background: var(--hover-bg); font-size: 12px; margin-right: 4px; }
  .status-draft { color: #b8a091; }
  .status-published { color: #7ba890; }

  /* ─── Form ─── */
  .form-card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 32px; }
  .form-group { margin-bottom: 24px; }
  .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; padding: 10px 14px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 15px; font-family: inherit;
    background: #fff; color: var(--text); transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
    outline: none; border-color: var(--accent);
  }
  .form-group textarea { min-height: 120px; resize: vertical; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

  .empty-state { text-align: center; padding: 60px 24px; color: var(--text-secondary); }
  .toast {
    position: fixed; bottom: 32px; right: 32px; padding: 14px 24px;
    border-radius: 8px; color: #fff; font-size: 14px; z-index: 999;
    animation: fadeIn 0.3s; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
  .toast-success { background: #7ba890; }
  .toast-error { background: var(--danger); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .actions-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }

  /* ─── Image upload ─── */
  .img-preview { width: 200px; height: 140px; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); margin-top: 8px; }
  .upload-row { display: flex; gap: 8px; align-items: center; }
  .upload-row input[type="file"] { display: none; }
  .upload-status { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

  @media (max-width: 768px) {
    .sidebar { width: 100%; height: auto; position: relative; flex-direction: row; flex-wrap: wrap; padding: 16px; gap: 8px; }
    .sidebar .logo { margin-bottom: 0; margin-right: auto; }
    .main { margin-left: 0; max-width: 100%; padding: 24px 16px; }
    .app-layout { flex-direction: column; }
    .form-row, .form-row-3 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ═══════════════ LOGIN ═══════════════ -->
<div id="login-screen">
  <div class="login-card">
    <h1>🔐 后台管理</h1>
    <p>请输入 GitHub Token 以登录</p>
    <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
    <br>
    <button class="btn btn-primary" onclick="login()" style="width:100%">登 录</button>
  </div>
</div>

<!-- ═══════════════ APP ═══════════════ -->
<div id="app-screen">
  <div class="app-layout">
    <aside class="sidebar">
      <div class="logo">🌸 小漫的角落</div>
      <nav>
        <a href="#articles" data-nav="articles">📝 文章管理</a>
        <a href="#works" data-nav="works">🎨 作品管理</a>
        <a href="#profile" data-nav="profile">👤 个人资料</a>
      </nav>
      <button class="logout-btn" onclick="logout()">← 退出登录</button>
    </aside>
    <main class="main" id="main-content"></main>
  </div>
</div>

<script>
/* ═══════════════ GLOBAL STATE ═══════════════ */
let token = localStorage.getItem("gh_token") || "";
const OWNER = "manjiangprayuki2204-dev";
const REPO = "my-blog-v2";

/* ═══════════════ INIT ═══════════════ */
window.addEventListener("hashchange", render);
if (token) { document.getElementById("token-input").value = token; showApp(); }
render();

/* ═══════════════ AUTH ═══════════════ */
function login() {
  const val = document.getElementById("token-input").value.trim();
  if (!val) return toast("请输入 Token", "error");
  token = val;
  localStorage.setItem("gh_token", token);
  showApp();
  render();
}

function logout() {
  localStorage.removeItem("gh_token");
  token = "";
  document.getElementById("app-screen").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
}

function showApp() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app-screen").style.display = "block";
}

/* ═══════════════ ROUTER ═══════════════ */
async function render() {
  if (!token) return;
  showApp();
  const hash = location.hash.replace("#", "") || "articles";
  const nav = hash.split("?")[0].split("/")[0];
  document.querySelectorAll("[data-nav]").forEach(a => a.classList.toggle("active", a.dataset.nav === nav));

  const main = document.getElementById("main-content");
  main.innerHTML = '<div style="text-align:center;padding:80px">加载中…</div>';

  if (hash === "articles") await renderArticleList(main);
  else if (hash === "articles/new") renderArticleForm(main, null);
  else if (hash.startsWith("articles/edit")) { const p = getHashParam("path"); if (p) await renderArticleForm(main, p); }
  else if (hash === "works") await renderWorkList(main);
  else if (hash === "works/new") renderWorkForm(main, null);
  else if (hash.startsWith("works/edit")) { const p = getHashParam("path"); if (p) await renderWorkForm(main, p); }
  else if (hash === "profile") await renderProfileForm(main);
}

function getHashParam(key) {
  const m = location.hash.match(new RegExp(`[?&]${key}=([^&]+)`));
  return m ? decodeURIComponent(m[1]) : null;
}

/* ═══════════════ API ═══════════════ */
async function api(method, path, body) {
  const url = path.startsWith("http") ? path : `/api/content${path}`;
  const opts = { method, headers: { "Content-Type": "application/json" } };
  if (body) opts.body = JSON.stringify(body);
  const resp = await fetch(url, opts);
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({ error: `HTTP ${resp.status}` }));
    throw new Error(err.error || `HTTP ${resp.status}`);
  }
  return resp.json();
}

/* ═══════════════ UTILS ═══════════════ */
function toast(msg, type) {
  const el = document.createElement("div");
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function parseFrontmatter(content) {
  if (!content.startsWith("---")) return { data: {}, body: content };
  const end = content.indexOf("---", 3);
  if (end === -1) return { data: {}, body: content };
  const fm = content.slice(3, end).trim();
  const body = content.slice(end + 3).trim();
  const data = {};
  fm.split("\n").forEach(line => {
    const i = line.indexOf(":");
    if (i > 0) {
      const key = line.slice(0, i).trim();
      let val = line.slice(i + 1).trim();
      // 去掉外层引号
      val = val.replace(/^"(.*)"$/, "$1").replace(/^'(.*)'$/, "$1");
      // 解析 YAML 数组: [a, b, c]
      if (val.startsWith("[") && val.endsWith("]")) {
        val = val.slice(1, -1).split(",").map(s => s.trim().replace(/^["']|["']$/g, ""));
        return data[key] = val;
      }
      data[key] = val;
    }
  });
  return { data, body };
}

// YAML 安全转义：处理反斜杠、引号等特殊字符
function yamlSafe(v) {
  return String(v).replace(/\\/g, "/").replace(/"/g, '\\"');
}

function buildMarkdown(data, content) {
  const lines = ["---"];
  for (const [k, v] of Object.entries(data)) {
    if (v === undefined || v === null || v === "") continue;
    // 多行文本字段用 YAML 块语法
    if (typeof v === "string" && v.includes("\n")) {
      lines.push(`${k}: |`);
      v.split("\n").forEach(line => lines.push(`  ${line}`));
    } else if (Array.isArray(v)) {
      lines.push(`${k}: [${v.map(x => `"${yamlSafe(String(x))}"`).join(", ")}]`);
    } else {
      const sv = yamlSafe(String(v));
      lines.push(`${k}: "${sv}"`);
    }
  }
  lines.push("---");
  lines.push("");
  lines.push(content || "");
  return lines.join("\n");
}

/* ═══════════════ ARTICLES LIST ═══════════════ */
async function renderArticleList(main) {
  try {
    const data = await api("GET", `?path=content/articles/`);
    const items = data.items || [];
    main.innerHTML = `
      <div class="page-header">
        <div class="actions-bar">
          <div><h2>📝 文章管理</h2><p>共 ${items.length} 篇文章</p></div>
          <a class="btn btn-primary" href="#articles/new">+ 新建文章</a>
        </div>
      </div>
      ${items.length === 0 ? '<div class="empty-state">还没有文章，点击上方按钮创建第一篇</div>' : `
      <div class="table-wrap"><table>
        <thead><tr><th>标题</th><th>标签</th><th>状态</th><th>日期</th><th>操作</th></tr></thead>
        <tbody>${items.filter(f=>f.name.endsWith('.md')).map(f=>{
          const name = f.name.replace('.md','');
          return `<tr>
            <td><strong>${name}</strong></td>
            <td>—</td>
            <td>—</td>
            <td>—</td>
            <td>
              <a class="btn btn-sm" href="#articles/edit?path=${encodeURIComponent(f.path)}">编辑</a>
              <button class="btn btn-sm btn-danger" onclick="del('${f.path}')">删除</button>
            </td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>`}
    `;
  } catch(e) { main.innerHTML = `<div class="empty-state">加载失败：${e.message}</div>`; }
}

/* ═══════════════ ARTICLE FORM ═══════════════ */
async function renderArticleForm(main, filePath) {
  const isNew = !filePath;
  let existing = { data: { slug:"", titleZh:"", titleEn:"", date: new Date().toISOString().slice(0,10), tags:"", summaryZh:"", summaryEn:"", status:"draft", type:"life", coverImage:"" }, body: "" };

  if (filePath) {
    try {
      const file = await api("GET", `?path=${encodeURIComponent(filePath)}`);
      const parsed = parseFrontmatter(file.content);
      existing = { data: { slug: filePath.split("/").pop().replace(".md",""), titleZh:"", titleEn:"", date:"", tags:"", summaryZh:"", summaryEn:"", status:"draft", type:"life", coverImage:"", ...parsed.data }, body: parsed.body };
    } catch(e) { main.innerHTML = `<div class="empty-state">加载文章失败：${e.message}</div>`; return; }
  }

  const d = existing.data;
  main.innerHTML = `
    <div class="page-header">
      <h2>${isNew ? '✏️ 新建文章' : '✏️ 编辑文章'}</h2>
      <p>${isNew ? '' : '路径：' + filePath}</p>
    </div>
    <div class="form-card">
      <div class="form-row">
        <div class="form-group"><label>Slug (URL)</label><input id="f-slug" value="${esc(d.slug)}" ${isNew?'':'readonly'}></div>
        <div class="form-group"><label>日期</label><input id="f-date" type="date" value="${esc(d.date)}"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>中文标题</label><input id="f-titleZh" value="${esc(d.titleZh)}"></div>
        <div class="form-group"><label>英文标题</label><input id="f-titleEn" value="${esc(d.titleEn)}"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>中文摘要</label><textarea id="f-summaryZh">${esc(d.summaryZh)}</textarea></div>
        <div class="form-group"><label>英文摘要</label><textarea id="f-summaryEn">${esc(d.summaryEn)}</textarea></div>
      </div>
      <div class="form-row-3">
        <div class="form-group"><label>标签 (逗号分隔)</label><input id="f-tags" value="${esc(d.tags)}" placeholder="生活,旅行,美食"></div>
        <div class="form-group"><label>类型</label><select id="f-type"><option value="life" ${d.type==='life'?'selected':''}>生活</option><option value="interest" ${d.type==='interest'?'selected':''}>兴趣</option></select></div>
        <div class="form-group"><label>状态</label><select id="f-status"><option value="draft" ${d.status==='draft'?'selected':''}>草稿</option><option value="published" ${d.status==='published'?'selected':''}>已发布</option></select></div>
      </div>
      <div class="form-group"><label>封面图</label>
        <div class="upload-row">
          <input id="f-coverImage" value="${esc(d.coverImage)}" placeholder="/images/xxx.jpg" style="flex:1">
          <input type="file" id="cover-upload-input" accept="image/*" onchange="uploadImage('cover', 'coverImage')">
          <button type="button" class="btn btn-sm" onclick="document.getElementById('cover-upload-input').click()">📷 上传</button>
        </div>
        <div class="upload-status" id="cover-upload-status"></div>
      </div>
      <div class="form-group"><label>中文正文 (Markdown)</label><textarea id="f-bodyZh" style="min-height:250px;font-family:monospace;font-size:14px">${esc(existing.body || '')}</textarea></div>
      <div class="form-group"><label>英文正文 (Markdown)</label><textarea id="f-bodyEn" style="min-height:250px;font-family:monospace;font-size:14px">${esc(d.bodyEn || '')}</textarea></div>
      <div style="display:flex;gap:12px;margin-top:8px">
        <button class="btn btn-primary" onclick="saveArticle('${isNew?'':'1'}', '${esc(filePath||'')}')">💾 保存</button>
        <a class="btn" href="#articles">取消</a>
      </div>
    </div>
  `;
}

async function saveArticle(isEdit, filePath) {
  const g = (id) => document.getElementById(id)?.value || "";
  const slug = g("f-slug").trim();
  if (!slug) return toast("Slug 不能为空", "error");

  // 标签：用户输入逗号分隔，转为数组
  const tagsStr = g("f-tags").trim();
  const tags = tagsStr ? tagsStr.split(/[,，]/).map(t => t.trim()).filter(Boolean) : [];

  const frontmatter = {
    slug, titleZh: g("f-titleZh"), titleEn: g("f-titleEn"),
    date: g("f-date"), tags: tags,
    summaryZh: g("f-summaryZh"), summaryEn: g("f-summaryEn"),
    status: g("f-status"), type: g("f-type"),
    coverImage: g("f-coverImage"),
    bodyEn: g("f-bodyEn"),
  };

  const path = `content/articles/${slug}.md`;
  const md = buildMarkdown(frontmatter, g("f-bodyZh"));

  try {
    await api("POST", "", { path, content: md, message: `${isEdit?'✏️':'📝'} ${isEdit?'更新':'创建'}文章：${g("f-titleZh")}` });
    toast("✅ 保存成功！1-2分钟后在网站可见", "success");
    location.hash = "articles";
  } catch(e) { toast("保存失败：" + e.message, "error"); }
}

/* ═══════════════ WORKS LIST ═══════════════ */
async function renderWorkList(main) {
  try {
    const data = await api("GET", `?path=content/works/`);
    const items = data.items || [];
    main.innerHTML = `
      <div class="page-header">
        <div class="actions-bar">
          <div><h2>🎨 作品管理</h2><p>共 ${items.length} 件作品</p></div>
          <a class="btn btn-primary" href="#works/new">+ 新建作品</a>
        </div>
      </div>
      ${items.length === 0 ? '<div class="empty-state">还没有作品</div>' : `
      <div class="table-wrap"><table>
        <thead><tr><th>作品名</th><th>类别</th><th>展示</th><th>操作</th></tr></thead>
        <tbody>${items.filter(f=>f.name.endsWith('.md')).map(f=>{
          const name = f.name.replace('.md','');
          return `<tr><td><strong>${name}</strong></td><td>—</td><td>—</td><td>
            <a class="btn btn-sm" href="#works/edit?path=${encodeURIComponent(f.path)}">编辑</a>
            <button class="btn btn-sm btn-danger" onclick="del('${f.path}')">删除</button>
          </td></tr>`;
        }).join('')}</tbody>
      </table></div>`}
    `;
  } catch(e) { main.innerHTML = `<div class="empty-state">加载失败：${e.message}</div>`; }
}

/* ═══════════════ WORK FORM ═══════════════ */
async function renderWorkForm(main, filePath) {
  const isNew = !filePath;
  let existing = { data: { slug:"", titleZh:"", titleEn:"", date:"", category:"design", descriptionZh:"", descriptionEn:"", published:"true", coverImage:"", images:"" }, body: "" };
  if (filePath) {
    try {
      const file = await api("GET", `?path=${encodeURIComponent(filePath)}`);
      const parsed = parseFrontmatter(file.content);
      existing = { data: { slug: filePath.split("/").pop().replace(".md",""), titleZh:"", titleEn:"", date:"", category:"design", descriptionZh:"", descriptionEn:"", published:"true", coverImage:"", images:"", ...parsed.data }, body: parsed.body };
    } catch(e) { main.innerHTML = `<div class="empty-state">加载失败：${e.message}</div>`; return; }
  }
  const d = existing.data;
  main.innerHTML = `
    <div class="page-header"><h2>${isNew?'🎨 新建作品':'🎨 编辑作品'}</h2></div>
    <div class="form-card">
      <div class="form-row">
        <div class="form-group"><label>Slug</label><input id="f-slug" value="${esc(d.slug)}" ${isNew?'':'readonly'}></div>
        <div class="form-group"><label>完成时间</label><input id="f-date" type="date" value="${esc(d.date)}"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>中文作品名</label><input id="f-titleZh" value="${esc(d.titleZh)}"></div>
        <div class="form-group"><label>英文作品名</label><input id="f-titleEn" value="${esc(d.titleEn)}"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>中文一句话描述</label><textarea id="f-descZh">${esc(d.descriptionZh)}</textarea></div>
        <div class="form-group"><label>英文一句话描述</label><textarea id="f-descEn">${esc(d.descriptionEn)}</textarea></div>
      </div>
      <div class="form-row-3">
        <div class="form-group"><label>类别</label><select id="f-category"><option value="design" ${d.category==='design'?'selected':''}>设计</option><option value="writing" ${d.category==='writing'?'selected':''}>文字</option><option value="other" ${d.category==='other'?'selected':''}>其他</option></select></div>
        <div class="form-group"><label>是否展示</label><select id="f-published"><option value="true" ${d.published==='true'?'selected':''}>展示</option><option value="false" ${d.published==='false'?'selected':''}>隐藏</option></select></div>
      </div>
      <div class="form-group"><label>封面图</label>
        <div class="upload-row">
          <input id="f-coverImage" value="${esc(d.coverImage)}" placeholder="/images/xxx.jpg" style="flex:1">
          <input type="file" id="work-cover-upload-input" accept="image/*" onchange="uploadImage('work-cover', 'coverImage')">
          <button type="button" class="btn btn-sm" onclick="document.getElementById('work-cover-upload-input').click()">📷 上传</button>
        </div>
        <div class="upload-status" id="work-cover-upload-status"></div>
      </div>
      <div class="form-group"><label>中文详细介绍 (Markdown)</label><textarea id="f-detailZh" style="min-height:250px;font-family:monospace;font-size:14px">${esc(existing.body)}</textarea></div>
      <div class="form-group"><label>英文详细介绍 (Markdown)</label><textarea id="f-detailEn" style="min-height:250px;font-family:monospace;font-size:14px">${esc(d.detailEn||'')}</textarea></div>
      <div style="display:flex;gap:12px;margin-top:8px">
        <button class="btn btn-primary" onclick="saveWork('${isNew?'':'1'}')">💾 保存</button>
        <a class="btn" href="#works">取消</a>
      </div>
    </div>
  `;
}

async function saveWork(isEdit) {
  const g = (id) => document.getElementById(id)?.value || "";
  const slug = g("f-slug").trim();
  if (!slug) return toast("Slug 不能为空", "error");
  const frontmatter = {
    slug, titleZh: g("f-titleZh"), titleEn: g("f-titleEn"),
    date: g("f-date"), category: g("f-category"),
    descriptionZh: g("f-descZh"), descriptionEn: g("f-descEn"),
    published: g("f-published"), coverImage: g("f-coverImage"),
    detailEn: g("f-detailEn"),
  };
  const path = `content/works/${slug}.md`;
  const md = buildMarkdown(frontmatter, g("f-detailZh"));
  try {
    await api("POST", "", { path, content: md, message: `${isEdit?'✏️':'🎨'} ${isEdit?'更新':'创建'}作品：${g("f-titleZh")}` });
    toast("✅ 保存成功！", "success");
    location.hash = "works";
  } catch(e) { toast("保存失败：" + e.message, "error"); }
}

/* ═══════════════ DELETE ═══════════════ */
async function del(filePath) {
  if (!confirm(`确定要删除 ${filePath} 吗？此操作不可撤销。`)) return;
  try {
    await api("DELETE", "", { path: filePath });
    toast("✅ 已删除", "success");
    render();
  } catch(e) { toast("删除失败：" + e.message, "error"); }
}

/* ═══════════════ IMAGE UPLOAD ═══════════════ */
function uploadImage(prefix, targetField) {
  const input = document.getElementById(`${prefix}-upload-input`);
  const statusEl = document.getElementById(`${prefix}-upload-status`);
  if (!input || !statusEl) return;
  const file = input.files[0];
  if (!file) return;

  if (file.size > 10 * 1024 * 1024) {
    statusEl.textContent = "图片不能超过 10MB";
    return;
  }

  statusEl.textContent = "上传中…";

  const reader = new FileReader();
  reader.onload = async function() {
    try {
      const resp = await fetch("/api/upload", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ filename: file.name, data: reader.result }),
      });
      const result = await resp.json();
      if (result.ok) {
        const pathInput = document.getElementById(`f-${targetField}`);
        if (pathInput) pathInput.value = result.path;
        statusEl.textContent = `✅ 上传成功: ${result.path}`;
        statusEl.style.color = "#7ba890";
      } else {
        statusEl.textContent = `❌ ${result.error || "上传失败"}`;
        statusEl.style.color = "#d4756b";
      }
    } catch(e) {
      statusEl.textContent = "❌ 网络错误";
      statusEl.style.color = "#d4756b";
    }
  };
  reader.readAsDataURL(file);
}

/* ═══════════════ HELPER ═══════════════ */
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
